services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hotel_notifications
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: hotel_password
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_user -d hotel_notifications"]
      interval: 5s
      timeout: 5s
      retries: 12
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes: [./backend:/app]
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://hotel_user:hotel_password@db:5432/hotel_notifications
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
  worker:
    build: ./backend
    command: celery -A config worker -l info
    volumes: [./backend:/app]
    environment:
      DATABASE_URL: postgresql://hotel_user:hotel_password@db:5432/hotel_notifications
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on: [backend, redis]
  beat:
    build: ./backend
    command: celery -A config beat -l info
    volumes: [./backend:/app]
    environment:
      DATABASE_URL: postgresql://hotel_user:hotel_password@db:5432/hotel_notifications
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on: [backend, redis]
  frontend:
    build: ./frontend
    volumes: [./frontend:/app, /app/node_modules]
    ports: ["5173:5173"]
    depends_on: [backend]
volumes:
  postgres_data:
